<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-KAJIAN TINDAKAN - RR Innovations</title>
    <style>
        /* --- Core Reset & Palette --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --navy-dark: #0a192f;
            --navy-mid: #112240;
            --navy-light: #233554;
            --gold: #d4af37;
            --gold-glow: #f3e5ab;
            --electric-blue: #00f2ff;
            --white: #ffffff;
            --text-muted: #a8b2d1;
        }

        body {
            background-color: var(--navy-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Ambient Cosmic Background --- */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header / Logo Section --- */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Futuristic Interconnected Monogram RR Logo */
        .logo-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Particle / Cosmic Swirl Effects */
        .cosmic-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top-color: var(--electric-blue);
            border-bottom-color: var(--gold);
            border-radius: 50%;
            animation: spin 8s linear infinite;
            filter: blur(1px);
            opacity: 0.6;
        }

        .cosmic-ring::before {
            content: '';
            position: absolute;
            top: 10px; right: 10px;
            width: 6px; height: 6px;
            background: var(--electric-blue);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--electric-blue);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* RR Monogram Graphic */
        .rr-monogram {
            width: 110px;
            height: 110px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6)) drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
            z-index: 2;
        }

        /* Sub-branding Typography */
        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--white);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            margin-top: 5px;
        }

        .brand-sub1 {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .brand-sub2 {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 400;
            letter-spacing: 4px;
            margin-top: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* --- Hero Section --- */
        .hero {
            text-align: center;
            margin: 30px 20px 40px 20px;
            max-width: 800px;
        }

        .hero h1 {
            font-size: 3rem;
            color: var(--white);
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--white) 60%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Main Content Layout --- */
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--navy-mid);
            border: 1px solid rgba(214, 175, 55, 0.2);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 60px;
            transition: border-color 0.3s ease;
        }

        .container:hover {
            border-color: rgba(0, 242, 255, 0.3);
        }

        /* --- Form / Input Fields --- */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gold);
            letter-spacing: 0
