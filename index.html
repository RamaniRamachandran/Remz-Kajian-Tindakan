<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e Kajian Tindakan | RR Innovation</title>
    <style>
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --gold: #d4af37;
            --white: #e6f1ff;
            --text-muted: #8892b0;
            --accent-gradient: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--accent-gradient); background-attachment: fixed; color: var(--white); line-height: 1.6; padding: 2rem 1rem; min-height: 100vh; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; }

        header { text-align: center; margin-bottom: 3rem; }
        .logo { width: 80px; height: 80px; background: var(--gold); color: var(--navy); border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 2rem; box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.3); animation: rotateLogo 20s linear infinite; }
        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .brand-text { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; color: var(--gold); letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); margin-bottom: 1rem; }

        .form-card { background: var(--navy-light); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
        .full-width { grid-column: span 2; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 14px; background: #0a192f; border: 1px solid #233554; color: var(--white); border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }

        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 24px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; border-radius: 6px; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        button:hover { background: var(--gold); color: var(--navy); }

        #report-output { margin-top: 3rem; display: none; }
        .report-section { background: var(--navy-light); padding: 2rem; margin-bottom: 1.5rem; border-radius: 8px; border-left: 4px solid var(--gold); }
        .report-section h3 { color: var(--gold); margin-bottom: 1rem; border-bottom: 1px solid #233554; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: var(--white); }
        th, td { border: 1px solid #233554; padding: 12px; text-align: left; }
        th { background: #0a192f; color: var(--gold); }

        footer { text-align: center; margin-top: 4rem; color: var(--text-muted); font-size: 0.75rem; border-top: 1px solid #233554; padding-top: 2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">RR</div>
        <div class="brand-text">RR Innovation • Forward Together</div>
        <h1>e Kajian Tindakan</h1>
        <p class="subtitle">Jom, Jana Draf Kajian Tindakan Anda.</p>
        <small>Hasil Inovasi RR Innovation | Versi 1.0.0 • Competition Edition</small>
    </header>

    <section id="form-section" class="form-card">
        <div class="form-grid">
            <div class="input-group">
                <label>Isu / Masalah Murid</label>
                <input type="text" id="isu" placeholder="Contoh: Lemah dalam sifir...">
            </div>
            <div class="input-group">
                <label>Bidang Kajian / Program</label>
                <input type="text" id="bidang" placeholder="Contoh: Akademik, HEM, Kaunseling...">
            </div>
            <div class="input-group">
                <label>Tahap Murid</label>
                <select id="tahap">
                    <option>Prasekolah</option><option>Tahun 1-6</option><option>Tingkatan 1-5</option><option>Pendidikan Khas (MBPK)</option><option>Lain-lain</option>
                </select>
            </div>
            <div class="input-group full-width">
                <label>Objektif Kajian</label>
                <textarea id="objektif" rows="3" placeholder="Contoh: Meningkatkan kefahaman murid melalui..."></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button onclick="janaKajian()">Jana Draf Kajian</button>
            <button onclick="resetApp()">Reset</button>
            <button onclick="downloadReport()">Download</button>
            <button onclick="copyPrompt()">AI Prompt</button>
        </div>
    </section>

    <div id="report-output"></div>

    <footer>
        © 2026 RR Innovation. Semua Hak Cipta Terpelihara.
    </footer>
</div>

<script>
    const contextEngine = {
        'Akademik': { theories: 'Konstruktivisme, Teori Pembelajaran Sosial', interventions: 'Gamifikasi, Teknik Visual Mapping', instruments: 'Praujian, Pascaujian, Analisis Dokumen' },
        'HEM': { theories: 'Teori Tingkah Laku (Behaviorism)', interventions: 'Sistem Token, Ganjaran Positif', instruments: 'Senarai Semak, Rekod Anekdot' },
        'Kaunseling': { theories: 'Teori Pemusatan Perorangan', interventions: 'Kaunseling Kelompok, Psikodrama', instruments: 'Temu Bual, Pemerhatian' },
        'Kokurikulum': { theories: 'Teori Kepimpinan Transformational', interventions: 'Latihan Kepimpinan, Mentor-Mentee', instruments: 'Soal Selidik, Portfolio' },
        'Default': { theories: 'Teori Refleksi (Schon)', interventions: 'Pendekatan Inovatif', instruments: 'Catatan Lapangan, Soal Selidik' }
    };

    function getEngineData(bidang) {
        const b = bidang.toLowerCase();
        if (b.includes('kaunseling')) return contextEngine.Kaunseling;
        if (b.includes('hem') || b.includes('disiplin')) return contextEngine.HEM;
        if (b.includes('kokurikulum')) return contextEngine.Kokurikulum;
        if (b.includes('akademik') || b.includes('subjek')) return contextEngine.Akademik;
        return contextEngine.Default;
    }

    function janaKajian() {
        const isu = document.getElementById('isu').value;
        const bidang = document.getElementById('bidang').value;
        const tahap = document.getElementById('tahap').value;
        const obj = document.getElementById('objektif').value;
        const engine = getEngineData(bidang);

        if(!isu || !bidang) { alert("Sila lengkapkan maklumat asas."); return; }

        const output = document.getElementById('report-output');
        output.style.display = 'block';
        
        output.innerHTML = `
            <div class="report-section"><h3>Tajuk Kajian</h3><p>Meningkatkan Penguasaan ${bidang} melalui ${isu} bagi Murid ${tahap}.</p></div>
            <div class="report-section"><h3>Fokus Kajian</h3><p>Kajian ini memfokuskan kepada intervensi ${isu} yang dikenalpasti sebagai kekangan utama dalam bidang ${bidang} bagi murid ${tahap}.</p></div>
            <div class="report-section"><h3>Pencetus Idea</h3><p>Berdasarkan pemerhatian harian dan analisis prestasi, terdapat keperluan mendesak untuk mengubah cara ${bidang} dilaksanakan bagi menangani masalah ${isu}.</p></div>
            <div class="report-section"><h3>Objektif Kajian</h3><p><strong>Objektif Umum:</strong> Meningkatkan keberkesanan ${bidang}.<br><strong>Objektif Khusus:</strong> ${obj}.</p></div>
            <div class="report-section"><h3>Persoalan Kajian</h3><p>1. Adakah penggunaan ${engine.interventions} dapat meningkatkan penguasaan murid dalam ${bidang}?<br>2. Sejauh manakah keberkesanan ${isu} ditangani melalui intervensi ini?</p></div>
            <div class="report-section"><h3>Kumpulan Sasaran</h3><p>Murid ${tahap} yang terlibat secara langsung dengan isu ${isu} dalam ${bidang}.</p></div>
            <div class="report-section"><h3>Analisis Tinjauan Awal</h3><p>Menggunakan instrumen: <strong>${engine.instruments}</strong>. Dapatan awal menunjukkan murid berada pada tahap rendah penguasaan ${bidang} berpunca daripada ${isu}.</p></div>
            <div class="report-section"><h3>Pelaksanaan & Teori</h3><p>Teori yang digunakan: <strong>${engine.theories}</strong>.<br>Intervensi: <strong>${engine.interventions}</strong>.</p></div>
            <div class="report-section"><h3>Jadual Pelaksanaan</h3>
                <table><tr><th>Minggu</th><th>Aktiviti</th></tr><tr><td>1-2</td><td>Analisis & Tinjauan Awal</td></tr><tr><td>3-6</td><td>Pelaksanaan Intervensi</td></tr><tr><td>7-8</td><td>Penilaian & Refleksi</td></tr></table>
            </div>
            <div class="report-section"><h3>Cadangan Kajian Seterusnya & Produk Inovasi</h3><p>Cadangan inovasi masa hadapan: Pembangunan modul interaktif berasaskan ${bidang}. Kajian seterusnya boleh memperluaskan skop kepada aspek kualitatif yang lebih mendalam.</p></div>
        `;
        output.scrollIntoView({ behavior: 'smooth' });
    }

    function resetApp() { location.reload(); }

    function downloadReport() {
        const reportContent = document.getElementById('report-output').innerText;
        const blob = new Blob([reportContent], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Draf_Kajian_Tindakan_RR_Innovation.txt";
        a.click();
    }

    function copyPrompt() {
        const engine = getEngineData(document.getElementById('bidang').value);
        const prompt = `Bertindak sebagai Pakar Kajian Tindakan Pendidikan Malaysia (berdasarkan standard DBP):
Sila hasilkan draf lengkap Kajian Tindakan bagi maklumat berikut:
1. Isu: ${document.getElementById('isu').value}
2. Bidang: ${document.getElementById('bidang').value}
3. Tahap: ${document.getElementById('tahap').value}
4. Objektif: ${document.getElementById('objektif').value}
5. Teori yang disyorkan: ${engine.theories}
6. Intervensi disyorkan: ${engine.interventions}
7. Instrumen: ${engine.instruments}

Sila tulis dalam format akademik rasmi yang lengkap dengan bahagian berikut:
- Tajuk Kajian
- Refleksi Pengajaran & Pembelajaran
- Fokus Kajian & Pencetus Idea
- Objektif & Persoalan Kajian
- Kumpulan Sasaran
- Analisis Tinjauan Awal
- Metodologi & Pelaksanaan Intervensi
- Cadangan Kajian Seterusnya & Produk Inovasi`;
        
        navigator.clipboard.writeText(prompt);
        alert("Master Prompt (Lengkap) telah disalin ke papan keratan.");
    }
</script>
</body>
</html>
