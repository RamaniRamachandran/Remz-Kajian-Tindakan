<section class="form-card">

    <div class="input-group">
        <label>Isu / Masalah Murid</label>
        <input
            type="text"
            id="isu"
            placeholder="Contoh: Murid sukar menghafal sifir, kurang keyakinan diri, ponteng sekolah, amalan kebersihan kelas kurang memuaskan.">
    </div>

    <div class="input-group">
        <label>Bidang Kajian / Program</label>
        <input
            type="text"
            id="bidang"
            placeholder="Contoh: Matematik, Bahasa Melayu, Kaunseling, HEM, Disiplin, Kokurikulum, NILAM, Kebersihan Kelas, PPDa">
    </div>

    <div class="input-group">
        <label>Tahap Murid</label>

        <select id="tahap">

            <option value="">-- Pilih Tahap Murid --</option>

            <optgroup label="Prasekolah">
                <option>Prasekolah</option>
            </optgroup>

            <optgroup label="Sekolah Rendah">
                <option>Tahun 1</option>
                <option>Tahun 2</option>
                <option>Tahun 3</option>
                <option>Tahun 4</option>
                <option>Tahun 5</option>
                <option>Tahun 6</option>
            </optgroup>

            <optgroup label="Sekolah Menengah">
                <option>Tingkatan 1</option>
                <option>Tingkatan 2</option>
                <option>Tingkatan 3</option>
                <option>Tingkatan 4</option>
                <option>Tingkatan 5</option>
            </optgroup>

            <optgroup label="Pendidikan Khas">
                <option>Pendidikan Khas (MBPK)</option>
            </optgroup>

            <option>Lain-lain</option>

        </select>
    </div>

    <div class="input-group">
        <label>Objektif Kajian</label>

        <textarea
            id="objektif"
            rows="3"
            placeholder="Contoh: Meningkatkan penguasaan sifir darab melalui penggunaan Teknik Petak Sifir dalam tempoh enam minggu."></textarea>

    </div>

    <div class="btn-group">

        <button onclick="janaKajian()">
            ✨ Jana Draf Kajian
        </button>

        <button onclick="resetForm()">
            🔄 Reset
        </button>

        <button onclick="copyPrompt()">
            🤖 Salin Prompt AI
        </button>

        <button onclick="downloadReport()">
            ⬇️ Muat Turun TXT
        </button>

    </div>

</section>
