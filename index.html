<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e Kajian Tindakan | EPKT™ Engine</title>
    <style>
        :root { --navy: #002147; --gold: #C5A059; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--white); padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--navy); text-align: center; }
        .header-line { border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--navy); color: var(--gold); border: none; padding: 12px 20px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background: #003366; }
        #output { margin-top: 30px; padding: 20px; background: #f9f9f9; border-left: 5px solid var(--gold); white-space: pre-wrap; font-size: 0.95em; }
        footer { text-align: center; font-size: 0.8em; margin-top: 30px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>e Kajian Tindakan</h1>
    <p style="text-align:center; font-style: italic;">EPKT™: Enjin Pintar Kajian Tindakan - RR Innovation</p>
    <div class="header-line"></div>

    <div class="form-group">
        <label>Isu / Masalah Murid</label>
        <input type="text" id="isu" placeholder="Contoh: Lemah sifir, Ponteng, Kurang keyakinan">
    </div>
    <div class="form-group">
        <label>Bidang Kajian</label>
        <select id="bidang">
            <option value="Akademik">Akademik</option>
            <option value="Kaunseling">Kaunseling</option>
            <option value="Disiplin">Disiplin</option>
            <option value="HEM">HEM</option>
            <option value="Kokurikulum">Kokurikulum</option>
            <option value="NILAM">NILAM</option>
            <option value="MBPK">MBPK / Pendidikan Khas</option>
        </select>
    </div>
    <div class="form-group">
        <label>Tahap Murid</label>
        <input type="text" id="tahap" placeholder="Contoh: Tahun 5, Tingkatan 3">
    </div>
    <div class="form-group">
        <label>Objektif Kajian</label>
        <textarea id="objektif" rows="2"></textarea>
    </div>

    <button onclick="prosesEPKT()">JANA DRAF KAJIAN</button>
    <button onclick="downloadDraft()" style="background: var(--gold); color: var(--navy);">MUAT TURUN (.txt)</button>

    <div id="output">Hasil draf akan dipaparkan di sini...</div>
</div>

<footer>
    Platform ini mengumpul statistik penggunaan secara anonim bagi tujuan penambahbaikan sistem. Tiada maklumat peribadi dikumpulkan.
</footer>

<script>
    const EPKT_ENGINE = {
        goals: {
            "sifir": "Penguasaan Sifir",
            "huruf": "Pengecaman Huruf",
            "ponteng": "Kehadiran Murid",
            "buli": "Pengurangan Kes Buli",
            "keyakinan": "Keyakinan Diri",
            "membaca": "Minat Membaca",
            "kotor": "Amalan Kebersihan",
            "fokus": "Tumpuan Semasa PdP",
            "lewat": "Kehadiran Murid"
        },

        domainConfig: {
            "Akademik": {
                template: "Meningkatkan Penguasaan {goal} melalui Teknik Gamifikasi dalam Kalangan Murid {tahap}",
                interventions: "Penggunaan bahan bantu belajar interaktif dan digital",
                methods: "Kajian Tindakan Model Kemmis & McTaggart",
                instruments: "Pra-Ujian, Pasca-Ujian, dan Lembaran Kerja",
                analysis: "Analisis deskriptif (perbandingan markah ujian)",
                innovation: "Aplikasi mudah alih interaktif"
            },
            "Kaunseling": {
                template: "Meningkatkan Keyakinan Diri melalui Modul Bimbingan Berfokus dalam Kalangan Murid {tahap}",
                interventions: "Sesi kaunseling individu menggunakan teknik CBT",
                methods: "Kajian Tindakan Model Elliot",
                instruments: "Pemerhatian, Temu bual, dan Skala Likert",
                analysis: "Analisis tematik (kualitatif)",
                innovation: "Sesi modul bimbingan video kreatif"
            },
            "Disiplin": {
                template: "Mengurangkan Kes {goal} melalui Program Mentor-Mentee dalam Kalangan Murid {tahap}",
                interventions: "Sistem pemantauan disiplin berasaskan ganjaran positif",
                methods: "Kajian Tindakan Model Lewin",
                instruments: "Rekod disiplin harian dan senarai semak",
                analysis: "Analisis statistik kekerapan salah laku",
                innovation: "Sistem merit-demerit digital"
            },
            "HEM": {
                template: "Meningkatkan Kehadiran Murid melalui Program Intervensi Ziarah Cakna dalam Kalangan Murid {tahap}",
                interventions: "Program 'Guru Penyayang' dan ziarah ke rumah",
                methods: "Kajian Tindakan Model Kemmis & McTaggart",
                instruments: "Buku rekod kehadiran dan borang temu bual",
                analysis: "Analisis data kehadiran bulanan",
                innovation: "Sistem amaran awal kehadiran"
            },
            "Kokurikulum": {
                template: "Meningkatkan Penyertaan Murid dalam {goal} melalui Sistem House Point dalam Kalangan Murid {tahap}",
                interventions: "Pemberian lencana digital dan ganjaran merit",
                methods: "Kajian Tindakan Model Kemmis & McTaggart",
                instruments: "Borang senarai semak penyertaan",
                analysis: "Analisis data kuantitatif penyertaan",
                innovation: "Sistem papan pendahulu (Leaderboard) digital"
            },
            "NILAM": {
                template: "Meningkatkan Minat Membaca melalui Program Literasi Digital dalam Kalangan Murid {tahap}",
                interventions: "Bengkel pembacaan digital dan ganjaran membaca",
                methods: "Kajian Tindakan Model Kemmis & McTaggart",
                instruments: "Rekod pinjaman buku dan buku NILAM",
                analysis: "Analisis data rekod bacaan murid",
                innovation: "Sudut literasi digital interaktif"
            },
            "MBPK": {
                template: "Meningkatkan Kemahiran {goal} melalui Terapi Sensori dalam Kalangan Murid {tahap}",
                interventions: "Aktiviti motor halus dan bahan bantu belajar khusus",
                methods: "Kajian Tindakan Model Kemmis & McTaggart",
                instruments: "Senarai semak perkembangan kemahiran",
                analysis: "Analisis pemerhatian berstruktur",
                innovation: "Alat bantu belajar (ABM) mesra sensori"
            }
        }
    };

    function prosesEPKT() {
        const rawIsu = document.getElementById('isu').value.toLowerCase();
        const bidang = document.getElementById('bidang').value;
        const tahap = document.getElementById('tahap').value;
        const obj = document.getElementById('objektif').value;
        
        let goal = rawIsu;
        for (let key in EPKT_ENGINE.goals) {
            if (rawIsu.includes(key)) {
                goal = EPKT_ENGINE.goals[key];
                break;
            }
        }

        const config = EPKT_ENGINE.domainConfig[bidang];
        const tajuk = config.template.replace("{goal}", goal).replace("{tahap}", tahap);
        
        const report = `=== DRAF KAJIAN TINDAKAN (EPKT™ v1.0) ===

1. TAJUK KAJIAN: ${tajuk}
2. REFLEKSI PdP: Murid menghadapi kekangan dalam penguasaan kemahiran asas yang memerlukan intervensi segera.
3. FOKUS KAJIAN: ${goal}.
4. PERNYATAAN MASALAH: Isu ini menghalang murid mencapai potensi akademik yang maksimum dan perlu ditangani secara sistematik.
5. OBJEKTIF UMUM: ${obj || tajuk}.
6. OBJEKTIF KHUSUS (SMART): Meningkatkan pencapaian ${goal} sebanyak 50% dalam tempoh 4 minggu.
7. PERSOALAN KAJIAN: Adakah intervensi ini dapat meningkatkan ${goal} murid ${tahap}?
8. KUMPULAN SASARAN: Murid ${tahap}.
9. INTERVENSI: ${config.interventions}.
10. METODOLOGI: ${config.methods}.
11. INSTRUMEN: ${config.instruments}.
12. ANALISIS DATA: ${config.analysis}.
13. JADUAL PELAKSANAAN: Fasa Perancangan, Pelaksanaan, Pemerhatian, Refleksi (4 Minggu).
14. ANGGARAN KOS: RM 50.00 - RM 150.00 (Bahan bantu mengajar).
15. CADANGAN INOVASI: ${config.innovation}.
16. REFLEKSI PENYELIDIK: Kajian ini dijangka mampu memberi impak positif terhadap kemenjadian murid.

--- CADANGAN PROMPT AI ---
"Bantu saya membina modul intervensi terperinci dan rancangan pengajaran harian (RPH) bagi tajuk: ${tajuk}."`;

        document.getElementById('output').innerText = report;
    }

    function downloadDraft() {
        const text = document.getElementById('output').innerText;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Draf_Kajian_Tindakan_EPKT.txt';
        a.click();
    }
</script>

</body>
</html>
