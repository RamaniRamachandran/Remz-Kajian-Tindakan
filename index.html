<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e Kajian Tindakan | Forward Together</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #d4af37;
            --white: #ffffff;
            --card-bg: #112240;
            --text-muted: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--navy);
            color: var(--white);
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        /* Hero Section */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--navy);
        }

        h1 { font-size: 2.5rem; color: var(--gold); margin-bottom: 0.5rem; }
        .tagline { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .full-width { grid-column: span 2; }

        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid #233554;
            color: var(--white);
            border-radius: 4px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover { background: var(--gold); color: var(--navy); }

        /* Cards Section */
        .results-section {
            margin-top: 3rem;
            display: none;
            animation: slideUp 0.8s ease-out;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-bottom: 3px solid var(--gold);
            border-radius: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">RR</div>
        <div class="tagline">Forward Together</div>
        <h1>e Kajian Tindakan</h1>
        <p>Jana draf idea kajian tindakan anda.</p>
    </header>

    <section id="form-section">
        <div class="form-grid">
            <div class="input-group">
                <label>Isu/Masalah Murid</label>
                <input type="text" id="isu" placeholder="Contoh: Lemah dalam sifir...">
            </div>
            <div class="input-group">
                <label>Mata Pelajaran/Bidang</label>
                <input type="text" id="subjek" placeholder="Contoh: Matematik">
            </div>
            <div class="input-group full-width">
                <label>Objektif Kajian</label>
                <textarea id="objektif" rows="3" placeholder="Contoh: Meningkatkan kefahaman..."></textarea>
            </div>
            <div class="input-group">
                <label>Tahap Murid</label>
                <input type="text" id="tahap" placeholder="Contoh: Tahap 2 (Tahun 5)">
            </div>
        </div>

        <div class="button-group">
            <button onclick="generateIdea()">Jana Idea Kajian</button>
            <button onclick="resetForm()">Reset</button>
            <button onclick="downloadData()">Download</button>
            <button onclick="copyPrompt()">AI Prompt</button>
        </div>
    </section>

    <section id="results" class="results-section">
        <h2 style="color: var(--gold); text-align: center; margin-bottom: 20px;">Cadangan Idea Kajian</h2>
        <div class="cards-container" id="cards"></div>
    </section>
</div>

<script>
    function generateIdea() {
        const isu = document.getElementById('isu').value;
        const subjek = document.getElementById('subjek').value;
        
        if (!isu || !subjek) { alert("Sila isi maklumat asas terlebih dahulu."); return; }

        const container = document.getElementById('cards');
        container.innerHTML = '';
        
        const ideas = [
            { title: "Pendekatan Gamifikasi", desc: `Menggunakan aplikasi interaktif untuk mengatasi isu ${isu} dalam subjek ${subjek}.` },
            { title: "Teknik Visual Mapping", desc: `Membantu murid memahami konsep ${subjek} dengan lebih berstruktur melalui peta minda.` },
            { title: "Modular Learning", desc: `Pecahan sub-topik kecil bagi memperkukuh penguasaan murid terhadap ${isu}.` }
        ];

        ideas.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${item.title}</h3><p style="margin-top:10px; color:#a8b2d1;">${item.desc}</p>`;
            container.appendChild(card);
        });

        document.getElementById('results').style.display = 'block';
    }

    function resetForm() {
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        document.getElementById('results').style.display = 'none';
    }

    function downloadData() {
        const text = `Kajian Tindakan\nIsu: ${document.getElementById('isu').value}\nSubjek: ${document.getElementById('subjek').value}`;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Draf_Kajian_Tindakan.txt';
        a.click();
    }

    function copyPrompt() {
        const prompt = `Cadangkan tajuk kajian tindakan untuk isu: ${document.getElementById('isu').value} dalam mata pelajaran ${document.getElementById('subjek').value} untuk tahap murid ${document.getElementById('tahap').value}.`;
        navigator.clipboard.writeText(prompt);
        alert("Prompt telah disalin ke clipboard!");
    }
</script>

</body>
</html>
