<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e Kajian Tindakan | Premium AI Engine</title>
    <style>
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --gold: #d4af37;
            --gold-light: #f5d76e;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Inter, sans-serif;
            background: radial-gradient(circle at top right, #1a2a6c, #0a192f);
            color: #e6f1ff;
            margin: 0;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1), transparent);
            filter: blur(80px);
            z-index: 0;
        }

        /* Redesigned Logo */
        .logo-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(10, 25, 47, 0.8);
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 800;
            color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            position: relative;
            transform: scaleX(-1);
        }
        .rr-inner { transform: scaleX(-1); }
        .logo-text { font-size: 1.2rem; margin-top: 15px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }

        h1 { font-size: 4rem; margin: 20px 0 0; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--gold-light); }
        input, select, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; box-sizing: border-box;
        }

        button {
            background: linear-gradient(45deg, var(--gold), #b8860b);
            border: none; padding: 18px; border-radius: 12px; cursor: pointer;
            font-weight: bold; color: var(--navy); transition: 0.3s; width: 100%; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        #output {
            margin-top: 30px; padding: 30px; background: rgba(0,0,0,0.3);
            border-radius: 20px; border-left: 5px solid var(--gold);
            white-space: pre-wrap; line-height: 1.6;
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="logo-circle"><div class="rr-inner">RR</div></div>
    <div class="logo-text">RR Innovation</div>
    <h1>e KAJIAN TINDAKAN</h1>
    <p class="subtitle">Platform Pintar Penjana Draf Kajian Tindakan untuk Warga Pendidik Malaysia</p>

    <div class="glass-card">
        <div class="form-group">
            <label>Isu / Masalah Murid</label>
            <input type="text" id="isu" placeholder="Contoh: Lemah sifir, Ponteng">
        </div>
        <div class="form-group">
            <label>Bidang Kajian</label>
            <select id="bidang">
                <option value="Akademik">Akademik</option>
                <option value="Kaunseling">Kaunseling</option>
                <option value="Disiplin">Disiplin</option>
                <option value="HEM">HEM</option>
                <option value="Kokurikulum">Kokurikulum</option>
                <option value="NILAM">NILAM</option>
                <option value="MBPK">MBPK / Pendidikan Khas</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tahap Murid</label>
            <input type="text" id="tahap" placeholder="Contoh: Tahun 5">
        </div>
        <div class="form-group">
            <label>Objektif Kajian</label>
            <textarea id="objektif" rows="2"></textarea>
        </div>

        <button onclick="prosesEPKT()">JANA DRAF KAJIAN</button>
        <button onclick="downloadDraft()" style="background: transparent; color: var(--gold); border: 1px solid var(--gold);">MUAT TURUN (.txt)</button>
    </div>

    <div id="output" class="glass-card" style="margin-top:20px;">Hasil draf akan dipaparkan di sini...</div>
</section>

<script>
    const EPKT_ENGINE = {
        goals: { "sifir": "Penguasaan Sifir", "huruf": "Pengecaman Huruf", "ponteng": "Kehadiran Murid", "buli": "Pengurangan Kes Buli", "keyakinan": "Keyakinan Diri", "membaca": "Minat Membaca", "kotor": "Amalan Kebersihan", "fokus": "Tumpuan Semasa PdP", "lewat": "Kehadiran Murid" },
        domainConfig: {
            "Akademik": { template: "Meningkatkan Penguasaan {goal} melalui Teknik Gamifikasi dalam Kalangan Murid {tahap}", interventions: "Penggunaan bahan bantu belajar interaktif dan digital", methods: "Kajian Tindakan Model Kemmis & McTaggart", instruments: "Pra-Ujian, Pasca-Ujian, dan Lembaran Kerja", analysis: "Analisis deskriptif (perbandingan markah ujian)", innovation: "Aplikasi mudah alih interaktif" },
            "Kaunseling": { template: "Meningkatkan Keyakinan Diri melalui Modul Bimbingan Berfokus dalam Kalangan Murid {tahap}", interventions: "Sesi kaunseling individu menggunakan teknik CBT", methods: "Kajian Tindakan Model Elliot", instruments: "Pemerhatian, Temu bual, dan Skala Likert", analysis: "Analisis tematik (kualitatif)", innovation: "Sesi modul bimbingan video kreatif" },
            "Disiplin": { template: "Mengurangkan Kes {goal} melalui Program Mentor-Mentee dalam Kalangan Murid {tahap}", interventions: "Sistem pemantauan disiplin berasaskan ganjaran positif", methods: "Kajian Tindakan Model Lewin", instruments: "Rekod disiplin harian dan senarai semak", analysis: "Analisis statistik kekerapan salah laku", innovation: "Sistem merit-demerit digital" },
            "HEM": { template: "Meningkatkan Kehadiran Murid melalui Program Intervensi Ziarah Cakna dalam Kalangan Murid {tahap}", interventions: "Program 'Guru Penyayang' dan ziarah ke rumah", methods: "Kajian Tindakan Model Kemmis & McTaggart", instruments: "Buku rekod kehadiran dan borang temu bual", analysis: "Analisis data kehadiran bulanan", innovation: "Sistem amaran awal kehadiran" },
            "Kokurikulum": { template: "Meningkatkan Penyertaan Murid dalam {goal} melalui Sistem House Point dalam Kalangan Murid {tahap}", interventions: "Pemberian lencana digital dan ganjaran merit", methods: "Kajian Tindakan Model Kemmis & McTaggart", instruments: "Borang senarai semak penyertaan", analysis: "Analisis data kuantitatif penyertaan", innovation: "Sistem papan pendahulu (Leaderboard) digital" },
            "NILAM": { template: "Meningkatkan Minat Membaca melalui Program Literasi Digital dalam Kalangan Murid {tahap}", interventions: "Bengkel pembacaan digital dan ganjaran membaca", methods: "Kajian Tindakan Model Kemmis & McTaggart", instruments: "Rekod pinjaman buku dan buku NILAM", analysis: "Analisis data rekod bacaan murid", innovation: "Sudut literasi digital interaktif" },
            "MBPK": { template: "Meningkatkan Kemahiran {goal} melalui Terapi Sensori dalam Kalangan Murid {tahap}", interventions: "Aktiviti motor halus dan bahan bantu belajar khusus", methods: "Kajian Tindakan Model Kemmis & McTaggart", instruments: "Senarai semak perkembangan kemahiran", analysis: "Analisis pemerhatian berstruktur", innovation: "Alat bantu belajar (ABM) mesra sensori" }
        }
    };

    function prosesEPKT() {
        const rawIsu = document.getElementById('isu').value.toLowerCase();
        const bidang = document.getElementById('bidang').value;
        const tahap = document.getElementById('tahap').value;
        const obj = document.getElementById('objektif').value;
        let goal = rawIsu;
        for (let key in EPKT_ENGINE.goals) { if (rawIsu.includes(key)) { goal = EPKT_ENGINE.goals[key]; break; } }
        const config = EPKT_ENGINE.domainConfig[bidang];
        const tajuk = config.template.replace("{goal}", goal).replace("{tahap}", tahap);
        const report = `=== DRAF KAJIAN TINDAKAN (EPKT™ v1.0) ===\n\n1. TAJUK KAJIAN: ${tajuk}\n2. REFLEKSI PdP: Murid menghadapi kekangan dalam penguasaan kemahiran asas yang memerlukan intervensi segera.\n3. FOKUS KAJIAN: ${goal}.\n4. PERNYATAAN MASALAH: Isu ini menghalang murid mencapai potensi akademik yang maksimum dan perlu ditangani secara sistematik.\n5. OBJEKTIF UMUM: ${obj || tajuk}.\n6. OBJEKTIF KHUSUS (SMART): Meningkatkan pencapaian ${goal} sebanyak 50% dalam tempoh 4 minggu.\n7. PERSOALAN KAJIAN: Adakah intervensi ini dapat meningkatkan ${goal} murid ${tahap}?\n8. KUMPULAN SASARAN: Murid ${tahap}.\n9. INTERVENSI: ${config.interventions}.\n10. METODOLOGI: ${config.methods}.\n11. INSTRUMEN: ${config.instruments}.\n12. ANALISIS DATA: ${config.analysis}.\n13. JADUAL PELAKSANAAN: Fasa Perancangan, Pelaksanaan, Pemerhatian, Refleksi (4 Minggu).\n14. ANGGARAN KOS: RM 50.00 - RM 150.00 (Bahan bantu mengajar).\n15. CADANGAN INOVASI: ${config.innovation}.\n16. REFLEKSI PENYELIDIK: Kajian ini dijangka mampu memberi impak positif terhadap kemenjadian murid.\n\n--- CADANGAN PROMPT AI ---\n"Bantu saya membina modul intervensi terperinci dan rancangan pengajaran harian (RPH) bagi tajuk: ${tajuk}."`;
        document.getElementById('output').innerText = report;
    }

    function downloadDraft() {
        const text = document.getElementById('output').innerText;
        const blob = new Blob([text], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Draf_Kajian_Tindakan_EPKT.txt';
        a.click();
    }
</script>

</body>
</html>
